<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BayTack | Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = { darkMode: "class", theme: { extend: {
    colors: {
      "primary": "#0050d4", "primary-dim": "#0046bb", "primary-fixed": "#7b9cff", "primary-container": "#7b9cff",
      "on-primary": "#f1f2ff", "on-primary-container": "#001e5a", "secondary": "#006947", "secondary-container": "#69f6b8",
      "on-secondary-container": "#005a3c", "tertiary": "#6f5900", "tertiary-fixed": "#fed01b", "tertiary-fixed-dim": "#eec200",
      "tertiary-container": "#fed01b", "on-tertiary-container": "#594700", "error": "#b31b25", "surface": "#f5f7f9",
      "surface-container-lowest": "#ffffff", "surface-container-low": "#eef1f3", "surface-container": "#e5e9eb",
      "surface-container-high": "#dfe3e6", "surface-container-highest": "#d9dde0", "inverse-surface": "#0b0f10",
      "on-surface": "#2c2f31", "on-surface-variant": "#595c5e", "outline": "#747779", "outline-variant": "#abadaf",
      "background": "#f5f7f9",
    },
    fontFamily: { body: ['Inter', 'sans-serif'], headline: ['Manrope', 'sans-serif'] },
  } } }
</script>
<link rel="stylesheet" href="../../../assets/css/landing.css" />
<style>body{padding-top:0}</style>
</head>
<body class="bg-background text-on-surface font-body" data-page="messages">

<div id="bt-header-mount"></div>

<main class="max-w-6xl mx-auto px-6 pb-24">
  <div class="mb-6">
    <h1 class="font-headline font-extrabold text-3xl md:text-4xl">Messages</h1>
  </div>

  <div class="bg-white rounded-3xl shadow overflow-hidden grid md:grid-cols-3 h-[32rem]">
    <!-- Conversation list -->
    <div class="border-r border-gray-100 overflow-y-auto" id="bt-conv-list"></div>

    <!-- Chat window -->
    <div class="md:col-span-2 flex flex-col">
      <div class="border-b border-gray-100 p-4 flex items-center gap-3" id="bt-chat-header"></div>
      <div class="flex-1 overflow-y-auto p-5 space-y-4" id="bt-chat-thread"></div>
      <div class="border-t border-gray-100 p-3 flex items-center gap-2">
        <input id="bt-chat-input" type="text" placeholder="Type a message..." class="flex-1 bg-surface-container-low rounded-full px-5 py-3 outline-none text-sm" />
        <button id="bt-chat-send" class="w-11 h-11 rounded-full bg-primary text-on-primary flex items-center justify-center shrink-0 hover:bg-primary-dim transition" aria-label="Send"><span class="material-symbols-outlined">send</span></button>
      </div>
    </div>
  </div>
</main>

<div id="bt-footer-mount"></div>

<script src="../_shared/customer-data.js"></script>
<script src="../_shared/customer-api.js"></script>
<script src="../_shared/customer-shell.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  let activeConvId = params.get('conv');
  let conversations = [];

  function relativeTime(iso) {
    const diffMs = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}h ago`;
    return new Date(iso).toLocaleDateString();
  }

  function renderList() {
    document.getElementById('bt-conv-list').innerHTML = conversations.map(c => `
      <button data-conv="${c.id}" class="w-full flex items-center gap-3 p-4 text-left hover:bg-surface-container-low transition ${c.id === activeConvId ? 'bg-blue-50' : ''}">
        <img src="${c.avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(c.providerName)}" class="w-11 h-11 rounded-full object-cover shrink-0" alt="${c.providerName}" />
        <div class="min-w-0 flex-1">
          <p class="font-bold text-sm truncate">${c.providerName}</p>
          <p class="text-xs text-on-surface-variant truncate">${c.lastMessage || ''}</p>
        </div>
        ${c.unreadCount > 0 ? `<span class="w-2.5 h-2.5 bg-primary rounded-full shrink-0"></span>` : ''}
      </button>`).join('') || `<p class="text-center text-on-surface-variant p-8 text-sm">No conversations yet.</p>`;

    document.querySelectorAll('[data-conv]').forEach(btn => btn.addEventListener('click', () => {
      activeConvId = btn.dataset.conv; renderList(); renderChat();
    }));
  }

  async function renderChat() {
    const thread = document.getElementById('bt-chat-thread');
    if (!activeConvId) {
      document.getElementById('bt-chat-header').innerHTML = '';
      thread.innerHTML = `<p class="text-center text-on-surface-variant py-16">Select a conversation to start chatting.</p>`;
      return;
    }
    thread.innerHTML = `<p class="text-center text-on-surface-variant py-16">Loading…</p>`;
    let conv;
    try {
      conv = await CustomerApi.messages.byId(activeConvId);
    } catch (err) {
      thread.innerHTML = `<p class="text-center text-error py-16">Could not load this conversation: ${err.message}</p>`;
      return;
    }
    document.getElementById('bt-chat-header').innerHTML = `
      <img src="${conv.avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(conv.providerName)}" class="w-10 h-10 rounded-full object-cover" alt="${conv.providerName}" />
      <div><p class="font-bold text-sm">${conv.providerName}</p></div>`;

    thread.innerHTML = conv.thread.map(m => `
      <div class="flex ${m.isMine ? 'justify-end' : 'justify-start'}">
        <div class="max-w-[75%] ${m.isMine ? 'bg-primary text-on-primary' : 'bg-surface-container-low text-on-surface'} rounded-2xl px-4 py-2.5">
          <p class="text-sm">${m.text}</p>
          <p class="text-[10px] mt-1 opacity-70">${relativeTime(m.sentAt)}</p>
        </div>
      </div>`).join('') || `<p class="text-center text-on-surface-variant py-16">No messages yet. Say hello!</p>`;
    thread.scrollTop = thread.scrollHeight;
  }

  document.getElementById('bt-chat-send').addEventListener('click', sendMessage);
  document.getElementById('bt-chat-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

  async function sendMessage() {
    const input = document.getElementById('bt-chat-input');
    const text = input.value.trim();
    if (!text || !activeConvId) return;
    input.disabled = true;
    try {
      await CustomerApi.messages.send(activeConvId, text);
      input.value = '';
      await renderChat();
      await loadConversations();
    } catch (err) {
      alert(err.message || 'Could not send message.');
    } finally {
      input.disabled = false;
      input.focus();
    }
  }

  async function loadConversations() {
    try {
      conversations = await CustomerApi.messages.all();
    } catch (err) {
      document.getElementById('bt-conv-list').innerHTML = `<p class="text-center text-error p-8 text-sm">${err.message}</p>`;
      return;
    }
    if (!activeConvId && conversations.length) activeConvId = conversations[0].id;
    renderList();
  }

  loadConversations().then(renderChat);
</script>
</body>
</html>
