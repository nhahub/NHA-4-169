<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BayTack | Request Details</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = { darkMode: "class", theme: { extend: {
    colors: {
      "primary": "#0050d4", "primary-dim": "#0046bb", "primary-fixed": "#7b9cff", "primary-container": "#7b9cff",
      "on-primary": "#f1f2ff", "on-primary-container": "#001e5a", "secondary": "#006947", "secondary-container": "#69f6b8",
      "on-secondary-container": "#005a3c", "tertiary": "#6f5900", "tertiary-fixed": "#fed01b", "tertiary-fixed-dim": "#eec200",
      "tertiary-container": "#fed01b", "on-tertiary-container": "#594700", "error": "#b31b25", "surface": "#f5f7f9",
      "surface-container-lowest": "#ffffff", "surface-container-low": "#eef1f3", "surface-container": "#e5e9eb",
      "surface-container-high": "#dfe3e6", "surface-container-highest": "#d9dde0", "inverse-surface": "#0b0f10",
      "on-surface": "#2c2f31", "on-surface-variant": "#595c5e", "outline": "#747779", "outline-variant": "#abadaf",
      "background": "#f5f7f9",
    },
    fontFamily: { body: ['Inter', 'sans-serif'], headline: ['Manrope', 'sans-serif'] },
  } } }
</script>
<link rel="stylesheet" href="../../../assets/css/landing.css" />
<style>body{padding-top:0}</style>
</head>
<body class="bg-background text-on-surface font-body" data-page="requests">

<div id="bt-header-mount"></div>

<main class="max-w-5xl mx-auto px-6 pb-24">
  <div id="bt-request-content"></div>
</main>

<div id="bt-footer-mount"></div>

<script src="../_shared/customer-data.js"></script>
<script src="../_shared/customer-api.js"></script>
<script src="../_shared/customer-shell.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const requestId = params.get('id');
  let request = null;

  // OfferResponse only has { id, providerId, amount, currency, durationInDays,
  // notes, status } - no providerName/avatar/rating/message fields exist on the
  // backend DTO, so this card shows only what's actually returned. No reject
  // endpoint exists on the backend (only accept), so Reject isn't wired.
  function offerCard(o) {
    return `
    <div class="bg-white rounded-3xl shadow p-6 flex flex-col md:flex-row md:items-center gap-5">
      <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center shrink-0 text-primary shrink-0">
        <span class="material-symbols-outlined">person</span>
      </div>
      <div class="flex-1 min-w-0">
        <p class="font-headline font-bold">Provider offer</p>
        ${o.notes ? `<p class="text-sm text-on-surface-variant mt-1">${o.notes}</p>` : ''}
        <div class="flex items-center gap-4 mt-2 text-sm">
          <span class="font-bold text-primary">${o.amount} ${o.currency}</span>
          <span class="text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-base">schedule</span>${o.durationInDays} day(s)</span>
          <span class="text-xs font-bold px-2 py-1 rounded-full bg-surface-container-low text-on-surface-variant">${o.status}</span>
        </div>
      </div>
      <div class="flex md:flex-col gap-2 shrink-0">
        ${request.status === 'open' && o.status === 'Pending' ? `
          <button data-accept="${o.id}" class="px-5 py-2.5 bg-primary text-on-primary rounded-full font-bold text-sm hover:bg-primary-dim transition">Accept</button>` : ''}
      </div>
    </div>`;
  }

  async function render() {
    const content = document.getElementById('bt-request-content');
    content.innerHTML = `<p class="text-center text-on-surface-variant py-24">Loading…</p>`;
    try {
      request = await CustomerApi.requests.byId(requestId);
    } catch (err) {
      content.innerHTML = `<p class="text-center text-error py-24">Could not load this request: ${err.message}</p>`;
      return;
    }
    if (!request) {
      content.innerHTML = `<p class="text-center text-on-surface-variant py-24">Request not found. <a href="../requests/index.html" class="text-primary font-bold">Go back</a></p>`;
      return;
    }

    content.innerHTML = `
      <a href="../requests/index.html" class="inline-flex items-center gap-1 text-sm text-on-surface-variant hover:text-primary mb-6"><span class="material-symbols-outlined text-base">arrow_back</span> Back to My Requests</a>

      <div class="bg-white rounded-3xl shadow p-6 md:p-8 mb-8">
        <div class="flex flex-wrap items-start justify-between gap-4">
          <div>
            <h1 class="font-headline font-extrabold text-2xl md:text-3xl">${request.title}</h1>
          </div>
          <span class="text-xs font-bold px-3 py-1.5 rounded-full ${request.status === 'open' ? 'bg-blue-100 text-primary' : request.status === 'assigned' ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-on-surface-variant'}">${request.status.charAt(0).toUpperCase() + request.status.slice(1)}</span>
        </div>

        <div class="grid sm:grid-cols-1 gap-4 mt-6">
          <div class="bg-surface-container-low rounded-2xl p-4">
            <p class="text-xs text-on-surface-variant">Location</p>
            <p class="font-bold text-lg mt-1">${request.location || 'Not specified'}</p>
          </div>
        </div>
      </div>

      <h2 class="font-headline font-bold text-xl mb-4">Offers (${request.offers.length})</h2>
      <div class="space-y-4" id="bt-offers-list">
        ${request.offers.map(offerCard).join('') || `<p class="text-on-surface-variant text-sm py-6">No offers yet. Providers will reach out soon.</p>`}
      </div>
    `;

    document.querySelectorAll('[data-accept]').forEach(btn => btn.addEventListener('click', async () => {
      btn.disabled = true; btn.textContent = 'Accepting…';
      try {
        await CustomerApi.requests.acceptOffer(request.id, btn.dataset.accept);
        window.location.href = '../orders/index.html';
      } catch (err) {
        alert(err.message || 'Could not accept this offer.');
        btn.disabled = false; btn.textContent = 'Accept';
      }
    }));
  }

  render();
</script>
</body>
</html>
