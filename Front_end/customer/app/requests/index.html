<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BayTack | My Requests</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = { darkMode: "class", theme: { extend: {
    colors: {
      "primary": "#0050d4", "primary-dim": "#0046bb", "primary-fixed": "#7b9cff", "primary-container": "#7b9cff",
      "on-primary": "#f1f2ff", "on-primary-container": "#001e5a", "secondary": "#006947", "secondary-container": "#69f6b8",
      "on-secondary-container": "#005a3c", "tertiary": "#6f5900", "tertiary-fixed": "#fed01b", "tertiary-fixed-dim": "#eec200",
      "tertiary-container": "#fed01b", "on-tertiary-container": "#594700", "error": "#b31b25", "surface": "#f5f7f9",
      "surface-container-lowest": "#ffffff", "surface-container-low": "#eef1f3", "surface-container": "#e5e9eb",
      "surface-container-high": "#dfe3e6", "surface-container-highest": "#d9dde0", "inverse-surface": "#0b0f10",
      "on-surface": "#2c2f31", "on-surface-variant": "#595c5e", "outline": "#747779", "outline-variant": "#abadaf",
      "background": "#f5f7f9",
    },
    fontFamily: { body: ['Inter', 'sans-serif'], headline: ['Manrope', 'sans-serif'] },
  } } }
</script>
<link rel="stylesheet" href="../../../assets/css/landing.css" />
<style>body{padding-top:0}</style>
</head>
<body class="bg-background text-on-surface font-body" data-page="requests">

<div id="bt-header-mount"></div>

<main class="max-w-5xl mx-auto px-6 pb-24">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
      <h1 class="font-headline font-extrabold text-3xl md:text-4xl">My Requests</h1>
      <p class="text-on-surface-variant mt-2">Track offers and manage the requests you've posted.</p>
    </div>
    <a href="../post-request/index.html" class="px-6 py-3 bg-primary text-on-primary rounded-full font-bold hover:bg-primary-dim transition-all flex items-center gap-2 shadow-lg shadow-primary/20 w-fit">
      <span class="material-symbols-outlined">add</span> Post Request
    </a>
  </div>

  <div id="bt-requests-list" class="space-y-5"></div>
  <p id="bt-empty" class="hidden text-center text-on-surface-variant py-16">You haven't posted any requests yet.</p>
</main>

<div id="bt-footer-mount"></div>

<script src="../_shared/customer-data.js"></script>
<script src="../_shared/customer-api.js"></script>
<script src="../_shared/customer-shell.js"></script>
<script>
  // Backend statuses are only open/assigned/closed - no separate "completed", and
  // Budget/Deadline are always null (CustomerJob doesn't persist them yet - see
  // RequestResponse.cs on the backend). There's also no manual "close" endpoint,
  // so that button is removed rather than left non-functional.
  const STATUS_STYLES = {
    open:     { label: 'Open',     cls: 'bg-blue-100 text-primary' },
    assigned: { label: 'Assigned', cls: 'bg-amber-100 text-amber-700' },
    closed:   { label: 'Closed',   cls: 'bg-gray-100 text-on-surface-variant' },
  };

  async function render() {
    const list = document.getElementById('bt-requests-list');
    list.innerHTML = `<p class="text-center text-on-surface-variant py-16">Loading requests…</p>`;
    document.getElementById('bt-empty').classList.add('hidden');

    let requests;
    try {
      requests = await CustomerApi.requests.all();
    } catch (err) {
      list.innerHTML = `<p class="text-center text-error py-16">Could not load requests: ${err.message}</p>`;
      return;
    }

    document.getElementById('bt-empty').classList.toggle('hidden', requests.length > 0);
    list.innerHTML = requests.map(r => {
      const st = STATUS_STYLES[r.status] || STATUS_STYLES.open;
      return `
      <div class="bg-white rounded-3xl shadow p-6">
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <span class="text-xs font-bold px-3 py-1 rounded-full ${st.cls}">${st.label}</span>
            <h3 class="font-headline font-bold text-xl mt-3">${r.title}</h3>
          </div>
          <div class="text-right shrink-0">
            <p class="text-xs text-on-surface-variant mt-1">${r.location || ''}</p>
          </div>
        </div>
        <div class="flex flex-wrap items-center gap-4 mt-5 text-sm text-on-surface-variant">
          <span class="flex items-center gap-1"><span class="material-symbols-outlined text-base">local_offer</span>${r.offers.length} offer(s)</span>
        </div>
        <div class="flex flex-wrap gap-3 mt-5">
          <a href="../request/index.html?id=${r.id}" class="px-5 py-2.5 bg-primary text-on-primary rounded-full font-bold text-sm hover:bg-primary-dim transition">View</a>
          <button data-delete="${r.id}" class="px-5 py-2.5 border-2 border-red-200 text-error rounded-full font-bold text-sm hover:bg-red-50 transition">Delete</button>
        </div>
      </div>`;
    }).join('');

    document.querySelectorAll('[data-delete]').forEach(btn => btn.addEventListener('click', async () => {
      if (!confirm('Delete this request? This cannot be undone.')) return;
      try { await CustomerApi.requests.remove(btn.dataset.delete); render(); }
      catch (err) { alert(err.message || 'Could not delete this request.'); }
    }));
  }

  render();
</script>
</body>
</html>
