<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BayTack | Post a Request</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = { darkMode: "class", theme: { extend: {
    colors: {
      "primary": "#0050d4", "primary-dim": "#0046bb", "primary-fixed": "#7b9cff", "primary-container": "#7b9cff",
      "on-primary": "#f1f2ff", "on-primary-container": "#001e5a", "secondary": "#006947", "secondary-container": "#69f6b8",
      "on-secondary-container": "#005a3c", "tertiary": "#6f5900", "tertiary-fixed": "#fed01b", "tertiary-fixed-dim": "#eec200",
      "tertiary-container": "#fed01b", "on-tertiary-container": "#594700", "error": "#b31b25", "surface": "#f5f7f9",
      "surface-container-lowest": "#ffffff", "surface-container-low": "#eef1f3", "surface-container": "#e5e9eb",
      "surface-container-high": "#dfe3e6", "surface-container-highest": "#d9dde0", "inverse-surface": "#0b0f10",
      "on-surface": "#2c2f31", "on-surface-variant": "#595c5e", "outline": "#747779", "outline-variant": "#abadaf",
      "background": "#f5f7f9",
    },
    fontFamily: { body: ['Inter', 'sans-serif'], headline: ['Manrope', 'sans-serif'] },
  } } }
</script>
<link rel="stylesheet" href="../../../assets/css/landing.css" />
<style>body{padding-top:0}</style>
</head>
<body class="bg-background text-on-surface font-body" data-page="requests">

<div id="bt-header-mount"></div>

<main class="max-w-4xl mx-auto px-6 pb-24">
  <div class="mb-8">
    <h1 class="font-headline font-extrabold text-3xl md:text-4xl">Post a Request</h1>
    <p class="text-on-surface-variant mt-2">Describe what you need and receive offers from nearby providers within minutes.</p>
  </div>

  <form id="bt-request-form" class="bg-white rounded-3xl shadow p-6 md:p-10 space-y-8">

    <!-- Section: Basics -->
    <div>
      <h2 class="font-headline font-bold text-lg mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">edit_note</span> Request Basics</h2>
      <div class="space-y-4">
        <div>
          <label class="text-sm font-semibold ml-1 mb-1 block">Title</label>
          <input required id="req-title" type="text" placeholder="e.g. Fix leaking kitchen faucet" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none" />
        </div>
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-semibold ml-1 mb-1 block">Service</label>
            <select required id="req-service" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none">
              <option value="">Loading services…</option>
            </select>
          </div>
          <div>
            <label class="text-sm font-semibold ml-1 mb-1 block">Preferred Payment</label>
            <select id="req-payment" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none">
              <option value="">No preference</option>
              <option value="Cash">Cash</option>
              <option value="Card">Card</option>
            </select>
          </div>
        </div>
        <div>
          <label class="text-sm font-semibold ml-1 mb-1 block">Description</label>
          <textarea required id="req-description" rows="4" placeholder="Describe the issue or job in detail..." class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none resize-none"></textarea>
        </div>
      </div>
    </div>

    <!-- Section: Budget & Timing -->
    <div>
      <h2 class="font-headline font-bold text-lg mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">payments</span> Budget &amp; Timing</h2>
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-semibold ml-1 mb-1 block">Budget (EGP) <span class="text-on-surface-variant font-normal">(optional)</span></label>
          <input id="req-budget" type="number" min="0" placeholder="e.g. 300" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none" />
        </div>
        <div>
          <label class="text-sm font-semibold ml-1 mb-1 block">Deadline <span class="text-on-surface-variant font-normal">(optional)</span></label>
          <input id="req-deadline" type="date" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none" />
        </div>
      </div>
    </div>

    <!-- Section: Location -->
    <div>
      <h2 class="font-headline font-bold text-lg mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">location_on</span> Location</h2>
      <div class="grid sm:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="text-sm font-semibold ml-1 mb-1 block">City</label>
          <select required id="req-city" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none">
            <option value="">Loading cities…</option>
          </select>
        </div>
        <div>
          <label class="text-sm font-semibold ml-1 mb-1 block">Area <span class="text-on-surface-variant font-normal">(optional)</span></label>
          <select id="req-area" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none">
            <option value="">Select a city first</option>
          </select>
        </div>
      </div>
      <label class="text-sm font-semibold ml-1 mb-1 block">Address Details</label>
      <input required id="req-location" type="text" placeholder="e.g. Street name, building number, floor" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none" />
    </div>

    <button type="submit" class="w-full bg-primary text-on-primary py-4 rounded-full font-bold text-lg hover:bg-primary-dim transition shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
      Submit Request <span class="material-symbols-outlined">arrow_forward</span>
    </button>
  </form>
</main>

<div id="bt-footer-mount"></div>

<script src="../_shared/customer-data.js"></script>
<script src="../_shared/customer-api.js"></script>
<script src="../_shared/customer-shell.js"></script>
<script>
  let cities = [];

  async function loadServices() {
    const select = document.getElementById('req-service');
    try {
      const services = await CustomerApi.services.all();
      select.innerHTML = '<option value="">Select a service</option>' +
        services.map(s => `<option value="${s.id}">${s.title} (${s.category})</option>`).join('');
    } catch (err) {
      select.innerHTML = '<option value="">Could not load services</option>';
    }
  }

  async function loadCities() {
    const citySelect = document.getElementById('req-city');
    try {
      cities = await CustomerApi.locations.cities();
      citySelect.innerHTML = '<option value="">Select a city</option>' +
        cities.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    } catch (err) {
      citySelect.innerHTML = '<option value="">Could not load cities</option>';
    }
  }

  document.getElementById('req-city').addEventListener('change', (e) => {
    const areaSelect = document.getElementById('req-area');
    const city = cities.find(c => c.id === e.target.value);
    if (!city || !city.areas.length) {
      areaSelect.innerHTML = '<option value="">No areas for this city</option>';
      return;
    }
    areaSelect.innerHTML = '<option value="">Select an area</option>' +
      city.areas.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
  });

  document.getElementById('bt-request-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const budgetValue = document.getElementById('req-budget').value;
    const deadlineValue = document.getElementById('req-deadline').value;
    const payload = {
      serviceId: document.getElementById('req-service').value,
      title: document.getElementById('req-title').value,
      description: document.getElementById('req-description').value,
      locationDetails: document.getElementById('req-location').value,
      cityId: document.getElementById('req-city').value,
      areaId: document.getElementById('req-area').value || null,
      budget: budgetValue ? Number(budgetValue) : null,
      deadline: deadlineValue ? new Date(deadlineValue).toISOString() : null,
      preferredPayment: document.getElementById('req-payment').value || null,
    };

    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Submitting…';
    try {
      await CustomerApi.requests.create(payload);
      window.location.href = '../requests/index.html';
    } catch (err) {
      alert(err.message || 'Could not submit your request. Please check all fields and try again.');
      btn.disabled = false; btn.innerHTML = 'Submit Request <span class="material-symbols-outlined">arrow_forward</span>';
    }
  });

  loadServices();
  loadCities();
</script>
</body>
</html>
