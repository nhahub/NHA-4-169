<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BayTack | Post a Request</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = { darkMode: "class", theme: { extend: {
    colors: {
      "primary": "#0050d4", "primary-dim": "#0046bb", "primary-fixed": "#7b9cff", "primary-container": "#7b9cff",
      "on-primary": "#f1f2ff", "on-primary-container": "#001e5a", "secondary": "#006947", "secondary-container": "#69f6b8",
      "on-secondary-container": "#005a3c", "tertiary": "#6f5900", "tertiary-fixed": "#fed01b", "tertiary-fixed-dim": "#eec200",
      "tertiary-container": "#fed01b", "on-tertiary-container": "#594700", "error": "#b31b25", "surface": "#f5f7f9",
      "surface-container-lowest": "#ffffff", "surface-container-low": "#eef1f3", "surface-container": "#e5e9eb",
      "surface-container-high": "#dfe3e6", "surface-container-highest": "#d9dde0", "inverse-surface": "#0b0f10",
      "on-surface": "#2c2f31", "on-surface-variant": "#595c5e", "outline": "#747779", "outline-variant": "#abadaf",
      "background": "#f5f7f9",
    },
    fontFamily: { body: ['Inter', 'sans-serif'], headline: ['Manrope', 'sans-serif'] },
  } } }
</script>
<link rel="stylesheet" href="../../../assets/css/landing.css" />
<style>body{padding-top:0}</style>
</head>
<body class="bg-background text-on-surface font-body" data-page="requests">

<div id="bt-header-mount"></div>

<main class="max-w-4xl mx-auto px-6 pb-24">
  <div class="mb-8">
    <h1 class="font-headline font-extrabold text-3xl md:text-4xl">Post a Request</h1>
    <p class="text-on-surface-variant mt-2">Describe what you need and receive offers from nearby providers within minutes.</p>
  </div>

  <form id="bt-request-form" class="bg-white rounded-3xl shadow p-6 md:p-10 space-y-8">

    <!-- Section: Basics -->
    <div>
      <h2 class="font-headline font-bold text-lg mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">edit_note</span> Request Basics</h2>
      <div class="space-y-4">
        <div>
          <label class="text-sm font-semibold ml-1 mb-1 block">Title</label>
          <input required id="req-title" type="text" placeholder="e.g. Fix leaking kitchen faucet" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none" />
        </div>
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-semibold ml-1 mb-1 block">Category</label>
            <select required id="req-category" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none">
              <option value="">Select category</option>
              <option>Plumbing</option><option>Electrical</option><option>AC Repair</option>
              <option>Cleaning</option><option>Carpentry</option><option>Painting</option><option>Other</option>
            </select>
          </div>
          <div>
            <label class="text-sm font-semibold ml-1 mb-1 block">Subcategory</label>
            <input id="req-subcategory" type="text" placeholder="e.g. Faucet repair" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none" />
          </div>
        </div>
        <div>
          <label class="text-sm font-semibold ml-1 mb-1 block">Description</label>
          <textarea required id="req-description" rows="4" placeholder="Describe the issue or job in detail..." class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none resize-none"></textarea>
        </div>
      </div>
    </div>

    <!-- Section: Budget & Timing -->
    <div>
      <h2 class="font-headline font-bold text-lg mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">payments</span> Budget &amp; Timing</h2>
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-semibold ml-1 mb-1 block">Budget (EGP)</label>
          <input required id="req-budget" type="number" min="0" placeholder="e.g. 300" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none" />
        </div>
        <div>
          <label class="text-sm font-semibold ml-1 mb-1 block">Deadline</label>
          <input required id="req-deadline" type="date" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none" />
        </div>
      </div>
    </div>

    <!-- Section: Location -->
    <div>
      <h2 class="font-headline font-bold text-lg mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">location_on</span> Location</h2>
      <input required id="req-location" type="text" placeholder="e.g. Tanta, Gharbia" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none" />
    </div>

    <!-- Section: Attachments -->
    <div>
      <h2 class="font-headline font-bold text-lg mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">attach_file</span> Images &amp; Attachments</h2>
      <label class="cursor-pointer block">
        <div class="border-2 border-dashed border-outline-variant rounded-2xl p-8 text-center hover:border-primary hover:bg-primary/5 transition-all">
          <span class="material-symbols-outlined text-outline text-3xl block mb-2">add_a_photo</span>
          <span class="text-sm font-semibold text-on-surface-variant" id="req-file-label">Click to upload photos or files (optional)</span>
        </div>
        <input type="file" multiple accept="image/*,.pdf" class="hidden" id="req-files" />
      </label>
    </div>

    <!-- Section: Required skills -->
    <div>
      <h2 class="font-headline font-bold text-lg mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">construction</span> Required Skills</h2>
      <input id="req-skills" type="text" placeholder="e.g. Plumbing, Faucet repair (comma separated)" class="w-full px-5 py-3.5 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/40 border-none" />
    </div>

    <button type="submit" class="w-full bg-primary text-on-primary py-4 rounded-full font-bold text-lg hover:bg-primary-dim transition shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
      Submit Request <span class="material-symbols-outlined">arrow_forward</span>
    </button>
  </form>
</main>

<div id="bt-footer-mount"></div>

<script src="../_shared/customer-data.js"></script>
<script src="../_shared/customer-shell.js"></script>
<script>
  document.getElementById('req-files').addEventListener('change', (e) => {
    const label = document.getElementById('req-file-label');
    label.textContent = e.target.files.length ? `${e.target.files.length} file(s) selected` : 'Click to upload photos or files (optional)';
  });

  document.getElementById('bt-request-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const skills = document.getElementById('req-skills').value.split(',').map(s => s.trim()).filter(Boolean);
    const request = {
      id: BTData.uid('req'),
      title: document.getElementById('req-title').value,
      category: document.getElementById('req-category').value,
      subcategory: document.getElementById('req-subcategory').value,
      description: document.getElementById('req-description').value,
      budget: Number(document.getElementById('req-budget').value),
      deadline: new Date(document.getElementById('req-deadline').value).toISOString(),
      location: document.getElementById('req-location').value,
      images: [],
      skills, status: 'open', createdAt: new Date().toISOString(), offers: [],
    };
    BTData.requests.add(request);
    window.location.href = '../requests/index.html';
  });
</script>
</body>
</html>
