<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BayTack — Loading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;900&family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/pages/loading.css"/>
</head>
<body class="loading-page">

  <div class="admin-loader-wrapper" id="adminLoaderWrapper">
    <div class="admin-loader-bg-grid"></div>
    <div class="admin-loader-particles" id="adminParticles"></div>

    <div class="admin-loader-logo-wrap">
      <div class="admin-loader-ring-outer"></div>
      <div class="admin-loader-ring"></div>
      <div class="admin-loader-logo-inner">
        <span class="material-symbols-outlined" style="font-size:2rem;color:#fff;font-variation-settings:'FILL' 1">handyman</span>
      </div>
    </div>

    <div class="admin-loader-brand">
      <span class="admin-loader-brand__primary">Bay</span><span class="admin-loader-brand__secondary">Tack</span>
    </div>
    <p class="admin-loader-tagline">Home Services Platform</p>

    <div class="admin-loader-progress-track">
      <div class="admin-loader-progress-fill" id="adminProgressFill"></div>
    </div>
    <p class="admin-loader-text">
      Loading<span class="admin-loader-dot admin-loader-dot--1">.</span><span class="admin-loader-dot admin-loader-dot--2">.</span><span class="admin-loader-dot admin-loader-dot--3">.</span>
    </p>
  </div>

  <script>
    /* Particles */
    const COLORS = ['#0050d4','#006947','#7b9cff','#69f6b8'];
    const container = document.getElementById('adminParticles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'admin-loader-particle';
      const s = Math.random() * 5 + 2;
      p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:0;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*3}s;`;
      container.appendChild(p);
    }

    /* Progress */
    const fill = document.getElementById('adminProgressFill');
    let prog = 0;
    const iv = setInterval(() => {
      prog = Math.min(prog + Math.random() * 12, 90);
      fill.style.width = prog + '%';
    }, 200);

    function finish(url) {
      clearInterval(iv);
      fill.style.width = '100%';
      setTimeout(() => {
        document.getElementById('adminLoaderWrapper').classList.add('is-fading');
        setTimeout(() => window.location.href = url, 500);
      }, 400);
    }

    const target = sessionStorage.getItem('ek_admin_redirect_target');
    if (target) {
      sessionStorage.removeItem('ek_admin_redirect_target');
      setTimeout(() => finish(target), 1800);
    } else {
      setTimeout(() => finish('admin/analytics.html'), 2200);
    }
  </script>
</body>
</html>
